services:
  stock-average-optimizer:
    build:
      context: .
    container_name: stock-average-optimizer
    restart: unless-stopped
    ports:
      # Require one local interface address; never publish on all interfaces.
      - "${BIND_ADDRESS:?Set BIND_ADDRESS to a local interface address}:${PORT:-8091}:80"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
